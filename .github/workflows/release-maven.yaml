# Publish Kelpie to Maven Central (Sonatype OSSRH) when a GitHub Release is published.
#
# Required repository secrets:
#   OSSRH_USERNAME    - Sonatype/Jira username
#   OSSRH_PASSWORD    - Sonatype token or password (https://central.sonatype.com/ has token)
#   GPG_PRIVATE_KEY   - Base64-encoded GPG private key (gpg --export-secret-keys KEY_ID | base64 -w 0)
#   GPG_PASSPHRASE    - Passphrase for the GPG key
#
# After this workflow runs, close and release the staging repository in the Sonatype Nexus UI
# (https://oss.sonatype.org/) so artifacts are published to Maven Central.

name: Release to Maven Central

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  JAVA_VERSION: '8'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Strip 'v' prefix from tag (e.g. v1.2.5 -> 1.2.5)
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        id: gpg
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode > key.asc
          gpg --batch --import key.asc
          KEY_ID=$(gpg --list-secret-keys --keyid-format SHORT --with-colons 2>/dev/null | grep '^sec' | head -1 | cut -d: -f5)
          echo "key_id=${KEY_ID}" >> $GITHUB_OUTPUT
          gpg --export-secret-keys "${KEY_ID}" > secring.gpg
          echo "Secret key imported (key id: ${KEY_ID})"

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_releaseVersion: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_signing_keyId: ${{ steps.gpg.outputs.key_id }}
          ORG_GRADLE_PROJECT_signing_password: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signing_secretKeyRingFile: ${{ github.workspace }}/secring.gpg
        run: ./gradlew publish --no-daemon

      - name: Clean up GPG key
        if: always()
        run: |
          rm -f key.asc secring.gpg
